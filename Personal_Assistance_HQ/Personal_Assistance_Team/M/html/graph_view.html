<!DOCTYPE html>
<html lang="th" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChZ Data - Knowledge Graph Explorer</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="graph_data.js"></script>
    
    <!-- Immediate Theme Loader -->
    <script>
        (function() {
            let savedTheme = 'dark';
            try {
                savedTheme = localStorage.getItem('wtj-theme') || 'dark';
            } catch (e) {}
            document.documentElement.className = savedTheme + '-theme';
        })();
    </script>
    
    <style>
        :root {
            /* Colors - Premium Dark Theme (#070a13) */
            --bg-main: #070a13;
            --panel-bg: rgba(12, 16, 31, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #cbd5e1;
            --text-muted: #64748b;
            --text-title: #ffffff;
            
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --grid-color: rgba(255, 255, 255, 0.02);
            --link-color: rgba(255, 255, 255, 0.04);
        }

        html.light-theme {
            /* Fallback Light Theme */
            --bg-main: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #334155;
            --text-muted: #64748b;
            --text-title: #0f172a;
            
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --grid-color: rgba(0, 0, 0, 0.03);
            --link-color: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Ambient Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        #graph-canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* Layout Right Sidebar */
        .control-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            left: auto;
            width: 320px;
            height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-left: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            transform: translateX(0);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .control-sidebar.collapsed {
            transform: translateX(320px);
        }

        /* Collapse Sidebar Trigger Button */
        .sidebar-toggle {
            position: absolute;
            top: 25px;
            left: -45px;
            right: auto;
            width: 45px;
            height: 45px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-right: none;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-size: 1.1rem;
            transition: background-color 0.3s ease;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .brand-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text-title);
        }

        .brand-subtitle {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Control Sections */
        .control-section {
            margin-bottom: 20px;
        }

        .control-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        /* Search input bar */
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 14px 8px 36px;
            font-size: 0.85rem;
            color: var(--text-title);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.3);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 0.9rem;
        }

        /* Filters and Checkboxes */
        .checkbox-container {
            display: flex;
            align-items: center;
            position: relative;
            padding-left: 26px;
            margin-bottom: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            color: var(--text-primary);
            user-select: none;
            font-weight: 500;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 16px;
            width: 16px;
            background-color: transparent;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: var(--accent);
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 4px;
            top: 1px;
            width: 4px;
            height: 7px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* Color Dot Indicators */
        .dot-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* Sidebar Bottom Actions */
        .sidebar-bottom {
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-action {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        /* Theme Selector Panel in Top Left */
        .top-left-controls {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 90;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-switch {
            display: flex;
            background-color: var(--panel-bg);
            backdrop-filter: blur(8px);
            padding: 4px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .theme-switch-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .theme-switch-btn.active {
            background-color: var(--accent);
            color: #ffffff;
        }

        /* Tooltip details */
        #tooltip {
            position: absolute;
            background: rgba(7, 10, 19, 0.95);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: none;
            pointer-events: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        /* Smooth Tooltip Transitions */
        #tooltip {
            transition: opacity 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            transform: scale(0.95);
        }

        #tooltip.visible {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>
    
    <!-- Ambient Grid -->
    <div class="grid-bg"></div>

    <!-- UI Tooltip -->
    <div id="tooltip"></div>

    <!-- Top Left Controls (Theme switcher & Wiki Hub link) -->
    <div class="top-left-controls">
        <a href="system_manuals.html" class="btn-action btn-secondary" style="border-radius: 16px; padding: 8px 16px; font-weight: 750; background: var(--panel-bg); backdrop-filter: blur(8px); width: auto;">
            <span>📖</span> Wiki Hub
        </a>
        
        <div class="theme-switch">
            <button class="theme-switch-btn" id="theme-btn-light" onclick="setTheme('light')">Light</button>
            <button class="theme-switch-btn active" id="theme-btn-dark" onclick="setTheme('dark')">Dark</button>
        </div>
    </div>

    <!-- Collapsible Right Sidebar Panel -->
    <aside class="control-sidebar" id="control-sidebar">
        <!-- Collapse Trigger -->
        <button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebar-toggle-btn">◀</button>
        
        <div class="brand-header">
            <div>
                <h1 class="brand-title">ChZ Graph Explorer</h1>
                <span class="brand-subtitle">Knowledge Base Relations</span>
            </div>
        </div>

        <!-- 1. Search Box -->
        <div class="control-section">
            <span class="control-label">ค้นหาความเชื่อมโยง (Search)</span>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-nodes" class="search-input" placeholder="ค้นหาโฟลเดอร์/ไฟล์..." onkeyup="handleSearch()">
            </div>
        </div>

        <!-- 2. Node Info Section -->
        <div class="control-section" id="node-info-section" style="border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-bottom: 16px;">
            <span class="control-label">NODE INFO</span>
            <div id="node-info-content" style="font-size: 0.8rem; line-height: 1.4; min-height: 50px; color: var(--text-muted);">
                คลิกเลือกโหนดในกราฟเพื่อดูรายละเอียด
            </div>
        </div>

        <!-- 3. Communities Filters Section -->
        <div class="control-section" style="flex: 1; overflow-y: auto; padding-right: 4px; margin-bottom: 10px;">
            <span class="control-label">COMMUNITIES</span>
            
            <label class="checkbox-container" style="font-weight: 700; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px;">
                <input type="checkbox" id="comm-select-all" onchange="toggleAllCommunities(this)" checked>
                <span class="checkmark" style="background-color: var(--accent); border-color: var(--accent);"></span>
                Select All
            </label>
            
            <div id="communities-list-panel" style="display: flex; flex-direction: column; gap: 8px;">
                <!-- Dynamically generated with JS -->
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="sidebar-bottom">
            <button class="btn-action btn-primary" onclick="resetZoom()">
                <span>🔄</span> รีเซ็ตมุมมอง (Reset Zoom)
            </button>
        </div>
    </aside>

    <!-- Canvas viewport for Force Layout -->
    <canvas id="graph-canvas"></canvas>

    <!-- UI Logics & D3 Layout Engines -->
    <script>
        // --- 1. Theme Logic (Support Light, Dark with safe try-catch wrapper) ---
        function setTheme(theme) {
            document.documentElement.className = theme + '-theme';
            document.body.className = theme + '-theme';
            
            document.querySelectorAll('.theme-switch-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`theme-btn-${theme}`);
            if (activeBtn) activeBtn.classList.add('active');
            
            try {
                localStorage.setItem('wtj-theme', theme);
            } catch (e) {
                console.warn('localStorage is not writable:', e);
            }
            
            // Re-draw Canvas when theme changes
            if (window.triggerCanvasRedraw) {
                window.triggerCanvasRedraw();
            }
        }

        // --- 2. Collapsible Sidebar ---
        function toggleSidebar() {
            const sidebar = document.getElementById('control-sidebar');
            const btn = document.getElementById('sidebar-toggle-btn');
            if (!sidebar || !btn) return;
            
            sidebar.classList.toggle('collapsed');
            const isCollapsed = sidebar.classList.contains('collapsed');
            
            if (isCollapsed) {
                btn.textContent = '◀'; // Point left to indicate open action
            } else {
                btn.textContent = '▶'; // Point right to indicate close action
            }
            
            try {
                localStorage.setItem('wtj-sidebar-collapsed', isCollapsed ? 'true' : 'false');
            } catch (e) {
                console.warn('localStorage is not writable:', e);
            }
        }

        // --- 3. Community Detection & Colors mapping ---
        const COMMUNITIES_LIST = [
            '🦉 Management (First)',
            '💎 Crypto Portfolio (Win)',
            '🚗 Grab Accounting (Jane)',
            '📊 Dashboard & Data (M)',
            '🎨 UI/UX Design (D)',
            '🎓 AI Sidekick Course',
            '📸 Food/Portrait Photo',
            '🎬 WTJ Podcast & Stories',
            '✂️ Video Editor (Cut)',
            '🧑💻 Coder Workspace (Q)',
            '🕵️♀️ Code Auditor',
            '👑 ChZ Room (Private)',
            '📈 Trade Speculation (Jaa)',
            '🧪 Agent Lab (Sandbox)',
            '🔑 Credentials Cabinet',
            '📚 Shared Knowledge Base',
            '🛠️ Root Utilities'
        ];

        const COMMUNITY_MAPPING = [
            { key: 'Personal_Assistance_HQ/First_Office', name: '🦉 Management (First)' },
            { key: 'Personal_Assistance_HQ/Personal_Assistance_Team/Team_Desks/Win', name: '💎 Crypto Portfolio (Win)' },
            { key: 'Personal_Assistance_HQ/Personal_Assistance_Team/Team_Desks/Jane', name: '🚗 Grab Accounting (Jane)' },
            { key: 'Personal_Assistance_HQ/Personal_Assistance_Team/Team_Desks/M', name: '📊 Dashboard & Data (M)' },
            { key: 'M/', name: '📊 Dashboard & Data (M)' },
            { key: 'Personal_Assistance_HQ/Personal_Assistance_Team/Team_Desks/D', name: '🎨 UI/UX Design (D)' },
            { key: 'Team_Content_Studio/Team_Agent_Content/AI_Sidekick_Project', name: '🎓 AI Sidekick Course' },
            { key: 'Team_Content_Studio/Team_Agent_Content/Photography_Project', name: '📸 Food/Portrait Photo' },
            { key: 'Team_Content_Studio', name: '🎬 WTJ Podcast & Stories' },
            { key: 'Editor_Studio', name: '✂️ Video Editor (Cut)' },
            { key: 'Coder_Studio/Q/', name: '🧑💻 Coder Workspace (Q)' },
            { key: 'Coder_Studio/Aom/', name: '🕵️♀️ Code Auditor' },
            { key: 'Coder_Studio', name: '🧑💻 Coder Workspace (Q)' },
            { key: 'ChZ_Room', name: '👑 ChZ Room (Private)' },
            { key: 'Trader_Agent', name: '📈 Trade Speculation (Jaa)' },
            { key: 'Agent_Lab', name: '🧪 Agent Lab (Sandbox)' },
            { key: 'credentials', name: '🔑 Credentials Cabinet' },
            { key: 'knowledge_base', name: '📚 Shared Knowledge Base' }
        ];

        function getCommunity(nodeId) {
            if (!nodeId || nodeId === 'root') return '🛠️ Root Utilities';
            
            for (const mapping of COMMUNITY_MAPPING) {
                if (nodeId.includes(mapping.key)) {
                    return mapping.name;
                }
            }
            return '🛠️ Root Utilities';
        }

        // Generate community colors with solid and fade representations
        const COMMUNITY_COLORS = {};
        COMMUNITIES_LIST.forEach((comm, idx) => {
            const hue = (idx * 360 / COMMUNITIES_LIST.length) % 360;
            COMMUNITY_COLORS[comm] = {
                solid: `hsl(${hue}, 75%, 60%)`,
                fade: `hsla(${hue}, 75%, 60%, 0.12)`
            };
        });

        // Initialize active communities
        let activeCommunities = new Set(COMMUNITIES_LIST);

        function countNodesPerCommunity() {
            const counts = {};
            COMMUNITIES_LIST.forEach(c => counts[c] = 0);
            
            graphData.nodes.forEach(n => {
                const comm = getCommunity(n.id);
                if (counts[comm] !== undefined) {
                    counts[comm]++;
                } else {
                    counts[comm] = 1;
                }
            });
            return counts;
        }

        function renderCommunitiesSelector() {
            const panel = document.getElementById('communities-list-panel');
            if (!panel) return;
            
            panel.innerHTML = '';
            const counts = countNodesPerCommunity();
            
            COMMUNITIES_LIST.forEach((comm, idx) => {
                const color = COMMUNITY_COLORS[comm] ? COMMUNITY_COLORS[comm].solid : '#94a3b8';
                const count = counts[comm] || 0;
                
                const label = document.createElement('label');
                label.className = 'checkbox-container';
                label.style.fontSize = '0.8rem';
                label.style.marginBottom = '4px';
                label.style.display = 'flex';
                label.style.alignItems = 'center';
                label.style.justifyContent = 'space-between';
                label.style.width = '100%';
                
                label.innerHTML = `
                    <span style="display: flex; align-items: center; gap: 8px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 80%;">
                        <input type="checkbox" class="comm-checkbox" value="${comm}" ${activeCommunities.has(comm) ? 'checked' : ''} onchange="onCommunityFilterChange(this)">
                        <span class="checkmark" style="border-color: ${color}; background-color: ${activeCommunities.has(comm) ? color : 'transparent'}"></span>
                        <span class="comm-text" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${comm}">${comm}</span>
                    </span>
                    <span style="font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-left: auto; padding-left: 8px;">${count}</span>
                `;
                panel.appendChild(label);
            });
        }

        function onCommunityFilterChange(cb) {
            const comm = cb.value;
            const checkmark = cb.nextElementSibling;
            const color = COMMUNITY_COLORS[comm] ? COMMUNITY_COLORS[comm].solid : '#94a3b8';
            
            if (cb.checked) {
                activeCommunities.add(comm);
                checkmark.style.backgroundColor = color;
            } else {
                activeCommunities.delete(comm);
                checkmark.style.backgroundColor = 'transparent';
            }
            
            const selectAll = document.getElementById('comm-select-all');
            if (activeCommunities.size === COMMUNITIES_LIST.length) {
                selectAll.checked = true;
                selectAll.nextElementSibling.style.backgroundColor = 'var(--accent)';
            } else if (activeCommunities.size === 0) {
                selectAll.checked = false;
                selectAll.nextElementSibling.style.backgroundColor = 'transparent';
            } else {
                selectAll.checked = false;
                selectAll.nextElementSibling.style.backgroundColor = 'transparent';
            }
            
            refreshLayout();
        }

        function toggleAllCommunities(cb) {
            const checkmarked = cb.checked;
            const checkboxes = document.querySelectorAll('.comm-checkbox');
            
            checkboxes.forEach(c => {
                c.checked = checkmarked;
                const comm = c.value;
                const checkmark = c.nextElementSibling;
                const color = COMMUNITY_COLORS[comm] ? COMMUNITY_COLORS[comm].solid : '#94a3b8';
                
                if (checkmarked) {
                    activeCommunities.add(comm);
                    checkmark.style.backgroundColor = color;
                } else {
                    activeCommunities.delete(comm);
                    checkmark.style.backgroundColor = 'transparent';
                }
            });
            
            cb.nextElementSibling.style.backgroundColor = checkmarked ? 'var(--accent)' : 'transparent';
            
            refreshLayout();
        }

        // --- 4. D3 Graph & Data Engine ---
        let width = window.innerWidth;
        let height = window.innerHeight;

        function getNodeRadius(d) {
            if (d.id === 'root') return 15;
            return d.type === 'directory' ? 10 : 5.5;
        }

        function isCommunityHub(d) {
            if (d.id === 'root') return true;
            if (d.type !== 'directory') return false;
            
            const parts = d.id.split('/');
            return parts.length <= 3; // First level folders are community hubs
        }

        function getNodeColor(d) {
            const comm = getCommunity(d.id);
            return (COMMUNITY_COLORS[comm] && COMMUNITY_COLORS[comm].solid) || '#94a3b8';
        }

        // Setup dimensions
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            
            const canvasEl = document.getElementById("graph-canvas");
            if (canvasEl) {
                canvasEl.width = width;
                canvasEl.height = height;
            }
            refreshLayout();
        });

        // Check if data is loaded
        if (typeof graphData === 'undefined') {
            document.body.innerHTML = "<div style='display:flex; justify-content:center; align-items:center; height:100vh; color:red; font-family:sans-serif;'><h2>Error: Could not load graph_data.js</h2></div>";
            console.error("graphData is not defined.");
        } else {
            // Initial render
            setTimeout(() => {
                renderCommunitiesSelector();
                refreshLayout();
            }, 100);
        }

        // Reset viewport zoom behavior
        function resetZoom() {
            const canvas = d3.select("#graph-canvas");
            if (canvas.node() && canvasZoom) {
                canvasTransform = d3.zoomIdentity.translate(width / 2 - 160, height / 2).scale(0.65);
                canvas.transition()
                    .duration(750)
                    .call(canvasZoom.transform, canvasTransform);
            }
        }

        function refreshLayout() {
            const filteredNodesList = graphData.nodes.filter(n => {
                if (n.id === 'root') return true;
                const comm = getCommunity(n.id);
                return activeCommunities.has(comm);
            });
            
            renderForceLayout(filteredNodesList);
            handleSearch();
        }

        // --- ENGINE: FORCE-DIRECTED CANVAS LAYOUT ---
        let simulation = null;
        let canvasZoom = null;
        let canvasTransform = d3.zoomIdentity;
        let hoveredNode = null;
        let selectedNode = null;

        function selectNode(node) {
            selectedNode = node;
            const infoContent = document.getElementById('node-info-content');
            if (node) {
                const commName = getCommunity(node.id);
                const commColorObj = COMMUNITY_COLORS[commName];
                const commColor = commColorObj ? commColorObj.solid : 'inherit';
                infoContent.innerHTML = `
                    <div style="font-weight: 700; color: var(--text-title); margin-bottom: 6px; font-size: 0.9rem; word-break: break-all;">${node.label}</div>
                    <div style="margin-bottom: 4px;"><span style="color: var(--text-muted);">Type:</span> <span style="font-family: 'Share Tech Mono', monospace; text-transform: uppercase; font-size: 0.72rem;">${node.type}</span></div>
                    <div style="margin-bottom: 4px;"><span style="color: var(--text-muted);">Community:</span> <span style="color: ${commColor}; font-weight: 600; font-size: 0.78rem;">${commName}</span></div>
                    <div style="word-break: break-all;"><span style="color: var(--text-muted);">Path:</span> <span style="font-size: 0.72rem; font-family: monospace;">${node.id}</span></div>
                `;
            } else {
                infoContent.innerHTML = `<span style="color: var(--text-muted);">คลิกเลือกโหนดในกราฟเพื่อดูรายละเอียด</span>`;
            }
        }

        function renderForceLayout(filteredNodesList) {
            const canvas = d3.select("#graph-canvas");
            const context = canvas.node().getContext("2d");
            
            // Fix canvas resolution bounds
            canvas.attr("width", width).attr("height", height);
            
            // Find valid links containing filtered nodes
            const nodeIds = new Set(filteredNodesList.map(n => n.id));
            const filteredLinks = graphData.links.filter(l => {
                const sId = typeof l.source === 'object' ? l.source.id : l.source;
                const tId = typeof l.target === 'object' ? l.target.id : l.target;
                return nodeIds.has(sId) && nodeIds.has(tId);
            }).map(l => {
                const sNode = typeof l.source === 'object' ? l.source : filteredNodesList.find(n => n.id === l.source);
                const tNode = typeof l.target === 'object' ? l.target : filteredNodesList.find(n => n.id === l.target);
                return {
                    source: sNode,
                    target: tNode
                };
            }).filter(l => l.source && l.target);

            simulation = d3.forceSimulation(filteredNodesList)
                .force("link", d3.forceLink(filteredLinks).id(d => d.id).distance(30))
                .force("charge", d3.forceManyBody().strength(-60))
                .force("center", d3.forceCenter(0, 0))
                .force("collision", d3.forceCollide().radius(d => getNodeRadius(d) + 6));

            // Stop simulation and pre-calculate coordinates in background silently (no jelly wiggling)
            simulation.stop();
            for (let i = 0; i < 200; ++i) {
                simulation.tick();
            }

            // Canvas Redraw Logic
            function drawCanvas() {
                context.save();
                context.clearRect(0, 0, width, height);
                
                // Apply zoom transformation
                context.translate(canvasTransform.x, canvasTransform.y);
                context.scale(canvasTransform.k, canvasTransform.k);
                
                // 1. Draw links (Grouped by color to minimize GPU Draw Calls & eliminate String Replace Risk)
                const linksByColor = new Map();
                const defaultFade = 'rgba(255, 255, 255, 0.05)';
                
                filteredLinks.forEach(l => {
                    const sourceComm = getCommunity(l.source.id);
                    const colorObj = COMMUNITY_COLORS[sourceComm];
                    const strokeColor = colorObj ? colorObj.fade : defaultFade;
                    
                    if (!linksByColor.has(strokeColor)) {
                        linksByColor.set(strokeColor, []);
                    }
                    linksByColor.get(strokeColor).push(l);
                });
                
                context.lineWidth = 1.5;
                linksByColor.forEach((links, strokeColor) => {
                    context.strokeStyle = strokeColor;
                    context.beginPath();
                    links.forEach(l => {
                        context.moveTo(l.source.x, l.source.y);
                        context.lineTo(l.target.x, l.target.y);
                    });
                    context.stroke();
                });
                
                const query = document.getElementById('search-nodes').value.toLowerCase().trim();
                
                // 2. Draw nodes circles
                filteredNodesList.forEach(d => {
                    const r = getNodeRadius(d);
                    const isHovered = hoveredNode === d;
                    const isMatched = query !== "" && d.label.toLowerCase().includes(query);
                    const isSelected = selectedNode === d;
                    
                    if (query === "" || isMatched || isHovered) {
                        context.globalAlpha = 1.0;
                    } else {
                        context.globalAlpha = 0.12;
                    }
                    
                    context.beginPath();
                    context.arc(d.x, d.y, r, 0, 2 * Math.PI);
                    context.fillStyle = getNodeColor(d);
                    context.fill();
                    
                    const isDark = document.documentElement.classList.contains("dark-theme");
                    context.strokeStyle = isDark ? "#070a13" : "#f8fafc";
                    context.lineWidth = 1.0;
                    context.stroke();
                    
                    if (isMatched || isSelected) {
                        context.beginPath();
                        context.arc(d.x, d.y, r + 5.0, 0, 2 * Math.PI);
                        context.strokeStyle = "var(--accent)";
                        context.lineWidth = 4.0;
                        context.stroke();
                    }
                });
                
                // 3. Draw text labels on top
                filteredNodesList.forEach(d => {
                    const isHovered = hoveredNode === d;
                    const isMatched = query !== "" && d.label.toLowerCase().includes(query);
                    const isHub = isCommunityHub(d);
                    
                    if (isHovered || isMatched || isHub) {
                        context.save();
                        context.globalAlpha = 1.0;
                        
                        context.font = isHub ? "600 12px Inter, sans-serif" : "400 10px Inter, sans-serif";
                        const textWidth = context.measureText(d.label).width;
                        
                        const r = getNodeRadius(d);
                        const offsetY = r + 10;
                        const bubbleY = r + 2;
                        
                        // Text background bubble
                        const isDark = document.documentElement.classList.contains("dark-theme");
                        context.fillStyle = isDark ? "rgba(7, 10, 19, 0.85)" : "rgba(248, 250, 252, 0.85)";
                        context.fillRect(d.x - textWidth / 2 - 4, d.y + bubbleY, textWidth + 8, 16);
                        
                        // Draw label text
                        context.fillStyle = isHovered || isMatched ? (isDark ? "#ffffff" : "#0f172a") : (isDark ? "#a0aec0" : "#475569");
                        context.textAlign = "center";
                        context.textBaseline = "middle";
                        context.fillText(d.label, d.x, d.y + offsetY);
                        
                        context.restore();
                    }
                });
                
                context.restore();
            }

            // Bind Zoom to Canvas
            canvasZoom = d3.zoom()
                .scaleExtent([0.02, 12])
                .on("zoom", (event) => {
                    canvasTransform = event.transform;
                    drawCanvas();
                });
            canvas.call(canvasZoom);

            // Bind Drag nodes to Canvas
            let draggedNode = null;
            canvas.call(d3.drag()
                .subject((event) => {
                    const [mouseX, mouseY] = d3.pointer(event);
                    const activeX = (mouseX - canvasTransform.x) / canvasTransform.k;
                    const activeY = (mouseY - canvasTransform.y) / canvasTransform.k;
                    
                    for (const d of filteredNodesList) {
                        const r = getNodeRadius(d);
                        const dist = Math.sqrt((d.x - activeX) ** 2 + (d.y - activeY) ** 2);
                        if (dist <= r + 8) return d;
                    }
                })
                .on("start", (event) => {
                    draggedNode = event.subject;
                    if (draggedNode) {
                        draggedNode.fx = draggedNode.x;
                        draggedNode.fy = draggedNode.y;
                    }
                })
                .on("drag", (event) => {
                    if (draggedNode) {
                        const [mouseX, mouseY] = d3.pointer(event, canvas.node());
                        const activeX = (mouseX - canvasTransform.x) / canvasTransform.k;
                        const activeY = (mouseY - canvasTransform.y) / canvasTransform.k;
                        
                        draggedNode.x = activeX;
                        draggedNode.y = activeY;
                        draggedNode.fx = activeX;
                        draggedNode.fy = activeY;
                        
                        drawCanvas();
                    }
                })
                .on("end", () => {
                    if (draggedNode) {
                        draggedNode.fx = null;
                        draggedNode.fy = null;
                        draggedNode = null;
                    }
                })
            );

            // Spatial Detection mousemove for tooltip & label preview
            canvas.on("mousemove", (event) => {
                const [mouseX, mouseY] = d3.pointer(event);
                const activeX = (mouseX - canvasTransform.x) / canvasTransform.k;
                const activeY = (mouseY - canvasTransform.y) / canvasTransform.k;
                
                let foundHover = null;
                for (const d of filteredNodesList) {
                    const r = getNodeRadius(d);
                    const dist = Math.sqrt((d.x - activeX) ** 2 + (d.y - activeY) ** 2);
                    if (dist <= r + 8) {
                        foundHover = d;
                        break;
                    }
                }
                
                if (foundHover !== hoveredNode) {
                    hoveredNode = foundHover;
                    if (hoveredNode) {
                        showTooltip(event, hoveredNode);
                        canvas.style("cursor", "pointer");
                    } else {
                        hideTooltip();
                        canvas.style("cursor", "default");
                    }
                    drawCanvas();
                }
            });

            canvas.on("click", (event) => {
                const [mouseX, mouseY] = d3.pointer(event);
                const activeX = (mouseX - canvasTransform.x) / canvasTransform.k;
                const activeY = (mouseY - canvasTransform.y) / canvasTransform.k;
                
                let clicked = null;
                for (const d of filteredNodesList) {
                    const r = getNodeRadius(d);
                    const dist = Math.sqrt((d.x - activeX) ** 2 + (d.y - activeY) ** 2);
                    if (dist <= r + 8) {
                        clicked = d;
                        break;
                    }
                }
                
                selectNode(clicked);
                drawCanvas();
            });

            canvas.on("mouseout", () => {
                if (hoveredNode) {
                    hoveredNode = null;
                    hideTooltip();
                    drawCanvas();
                }
            });

            // Initial center translation on start
            canvasTransform = d3.zoomIdentity.translate(width / 2 - 160, height / 2).scale(0.65);
            canvas.call(canvasZoom.transform, canvasTransform);
            
            drawCanvas();
            window.triggerCanvasRedraw = drawCanvas;
        }

        // --- TOOLTIP CONTROLLERS ---
        let tooltipTimeout = null;
        function showTooltip(event, d) {
            if (tooltipTimeout) clearTimeout(tooltipTimeout);
            const tooltip = d3.select("#tooltip");
            tooltip.html(`
                <div style="font-weight: 700; margin-bottom: 4px; color: var(--text-title);">${d.label}</div>
                <div style="font-size: 0.72rem; color: var(--text-muted); font-family: 'Share Tech Mono', monospace; text-transform: uppercase;">Type: ${d.type}</div>
                <div style="font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; font-weight: 500;">Community: ${getCommunity(d.id)}</div>
                <div style="font-size: 0.65rem; color: var(--text-muted); margin-top: 2px;">Path: ${d.id}</div>
            `);
            tooltip.style("display", "block");
            
            requestAnimationFrame(() => {
                tooltip.classed("visible", true);
            });
            moveTooltip(event);
        }

        function moveTooltip(event) {
            d3.select("#tooltip")
                .style("left", (event.pageX + 16) + "px")
                .style("top", (event.pageY - 28) + "px");
        }

        function hideTooltip() {
            const tooltip = d3.select("#tooltip");
            tooltip.classed("visible", false);
            
            if (tooltipTimeout) clearTimeout(tooltipTimeout);
            tooltipTimeout = setTimeout(() => {
                if (!tooltip.classed("visible")) {
                    tooltip.style("display", "none");
                }
            }, 200);
        }

        // --- SEARCH ENGINE REALTIME HIGHLIGHT ---
        function handleSearch() {
            if (window.triggerCanvasRedraw) {
                window.triggerCanvasRedraw();
            }
        }
        
        // Initial Theme & Sidebar Load from localStorage safely
        (function() {
            let savedTheme = 'dark';
            let sidebarCollapsed = false;
            try {
                savedTheme = localStorage.getItem('wtj-theme') || 'dark';
                sidebarCollapsed = localStorage.getItem('wtj-sidebar-collapsed') === 'true';
            } catch (e) {}
            
            setTheme(savedTheme);
            
            if (sidebarCollapsed) {
                const sidebar = document.getElementById('control-sidebar');
                const btn = document.getElementById('sidebar-toggle-btn');
                if (sidebar && btn) {
                    sidebar.classList.add('collapsed');
                    btn.textContent = '◀';
                }
            } else {
                const sidebar = document.getElementById('control-sidebar');
                const btn = document.getElementById('sidebar-toggle-btn');
                if (sidebar && btn) {
                    btn.textContent = '▶';
                }
            }
        })();
    </script>
</body>
</html>
